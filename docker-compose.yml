services:

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: his_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-his_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-his_password}
      POSTGRES_DB: ${POSTGRES_DB:-his_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-his_user} -d ${POSTGRES_DB:-his_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - his_network

  # ─────────────────────────────────────────────────────────────
  # FastAPI Backend (FHIR API)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: his_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-his_user}:${POSTGRES_PASSWORD:-his_password}@postgres:5432/${POSTGRES_DB:-his_db}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-his_user}:${POSTGRES_PASSWORD:-his_password}@postgres:5432/${POSTGRES_DB:-his_db}
      APP_NAME: "HIS FHIR API"
      APP_VERSION: "1.0.0"
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - his_network

  # ─────────────────────────────────────────────────────────────
  # pgAdmin — PostgreSQL Web UI
  # ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: his_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@his.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - his_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  his_network:
    driver: bridge
